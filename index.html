<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Артанат | Dante Sogliano</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root {
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --bg-transparent: rgba(0, 0, 0, 0);
            --text-accent: #00D0FF; 
            --border-color: rgba(0, 208, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: var(--text-main); font-family: 'Fira Code', monospace; line-height: 1.6; overflow-x: hidden; }

        #starfield, #watermark { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        #starfield { z-index: -2; } #watermark { z-index: -1; }

        .controls-right { position: fixed; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100; }
        .controls-left { position: fixed; top: 20px; left: 20px; display: flex; gap: 15px; z-index: 100; }
        .icon-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-accent); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; backdrop-filter: blur(5px); outline: none; }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 15px var(--border-color); transform: scale(1.1); }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; transition: opacity 0.8s ease; }
        .container.hidden-ui { opacity: 0; pointer-events: none; }

        header { display: flex; flex-direction: column; align-items: center; margin-bottom: 50px; text-align: center; }
        .logo { cursor: pointer; margin-bottom: 15px; outline: none; user-select: none; transform: rotate(0deg); transform-origin: center center; }
        h1 { font-size: 2rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; color: var(--text-accent); }

        nav { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; border-bottom: 1px dashed var(--border-color); padding-bottom: 20px; width: 100%; }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 1.1rem; transition: color 0.3s; text-transform: lowercase; cursor: pointer; }
        nav a:before { content: "./"; color: var(--text-accent); opacity: 0; transition: opacity 0.3s;}
        nav a:hover, nav a.active { color: var(--text-main); }
        nav a:hover:before, nav a.active:before { opacity: 1; }

        /* Ветки (Папки) */
        .branch-controls { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; padding: 15px; border: 1px dashed var(--border-color); background: rgba(0,0,0,0.5); }
        .styled-input { background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,0.2); color: var(--text-main); font-family: inherit; font-size: 0.9rem; padding: 8px; outline: none; flex-grow: 1; }
        .styled-input::placeholder { color: var(--text-dim); }
        
        .branch-card { border-left: 2px solid var(--text-accent); padding: 15px 20px; margin-bottom: 15px; cursor: pointer; transition: background 0.3s; display: flex; justify-content: space-between; align-items: center; background: rgba(0,208,255,0.02); }
        .branch-card:hover { background: rgba(0,208,255,0.1); }
        .branch-name { font-size: 1.2rem; font-weight: 500; }
        .branch-meta { font-size: 0.8rem; color: var(--text-dim); }

        /* Блок ввода внутри ветки */
        .composer { margin-bottom: 40px; border: 1px solid var(--border-color); padding: 2px; position: relative; display: flex; flex-direction: column; }
        .composer textarea { width: 100%; background: transparent; border: none; color: var(--text-main); font-family: inherit; font-size: 1rem; padding: 20px; resize: none; outline: none; min-height: 100px; }
        .composer-actions { display: flex; justify-content: space-between; padding: 10px 20px; border-top: 1px dashed var(--border-color); flex-wrap: wrap; gap: 10px; }
        .action-btn { background: transparent; border: none; color: var(--text-accent); font-family: inherit; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: opacity 0.3s; outline: none; }
        .action-btn:hover { opacity: 0.7; }
        .submit-btn { border: 1px solid var(--text-accent); padding: 5px 15px; border-radius: 4px; margin-left: auto; }
        .submit-btn:hover { background: var(--text-accent); color: #000; }

        .post { background: var(--bg-transparent); border-left: 1px dashed var(--border-color); padding-left: 20px; position: relative; margin-bottom: 40px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .post::before { content: ">"; position: absolute; left: -8px; top: 0; color: var(--text-accent); background: #000; }
        .post-meta { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .post-author { color: var(--text-accent); }
        .post-content { font-size: 1.05rem; word-wrap: break-word; white-space: pre-wrap; }
        .post-content img, .post-content video, .post-content audio { max-width: 100%; border-radius: 4px; margin-top: 15px; border: 1px solid var(--border-color); }
        
        .delete-btn { background: none; border: none; color: #ff4444; cursor: pointer; opacity: 0.5; transition: opacity 0.3s; margin-left: 10px; }
        .delete-btn:hover { opacity: 1; }

        .view-section { display: none; }
        .view-section.active { display: block; }
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; }

        footer { margin-top: 80px; text-align: center; font-size: 0.8rem; color: #555; border-top: 1px solid var(--border-color); padding-top: 20px; padding-bottom: 40px; }
        
        #loading-overlay { display: none; text-align: center; padding: 20px; color: var(--text-accent); }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    <div id="watermark"></div>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/02/10/audio_fc8b725091.mp3?filename=space-ambient-113944.mp3" type="audio/mpeg">
    </audio>

    <div class="controls-left">
        <button id="hide-btn" class="icon-btn" title="Скрыть интерфейс"><i class="fa-solid fa-eye-slash"></i></button>
    </div>

    <div class="controls-right">
        <button id="music-btn" class="icon-btn" title="Воспроизвести музыку"><i class="fa-solid fa-play"></i></button>
        <button id="fullscreen-btn" class="icon-btn" title="На весь экран"><i class="fa-solid fa-expand"></i></button>
    </div>

    <div class="container" id="main-container">
        <header>
            <svg id="main-logo" class="logo" title="Нажми, чтобы раскрутить" width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
                <rect width="100%" height="100%" fill="none"/>
                <g transform="translate(70,70)">
                  <circle cx="0" cy="0" r="34" fill="white" stroke="none" stroke-width="0.5" opacity="0.2"/>
                  <g transform="rotate(0)"><circle cx="45" cy="0" r="8" fill="#FF0000"/></g>
                  <g transform="rotate(51.4)"><circle cx="45" cy="0" r="7" fill="#FF8000"/></g>
                  <g transform="rotate(102.8)"><circle cx="45" cy="0" r="6" fill="#FFFF00"/></g>
                  <g transform="rotate(154.2)"><circle cx="45" cy="0" r="5" fill="#00FF80"/></g>
                  <g transform="rotate(205.6)"><circle cx="45" cy="0" r="6" fill="#00D0FF"/></g>
                  <g transform="rotate(257)"><circle cx="45" cy="0" r="7" fill="#0000FF"/></g>
                  <g transform="rotate(308.4)"><circle cx="45" cy="0" r="8" fill="#8000FF"/></g>
                </g>
                <g transform="translate(70,70)">
                  <circle cx="0" cy="0" r="8" fill="white"/>
                  <circle cx="0" cy="0" r="11" fill="none" stroke="white" stroke-width="7" opacity="0.2"/>
                </g>
                <g transform="translate(70,70)" font-family="Fira Code, sans-serif" font-size="10" fill="white" text-anchor="middle" dominant-baseline="central">
                  <g transform="rotate(45)"><text x="0" y="-20">T</text></g>
                  <g transform="rotate(-135)"><text x="0" y="-20">T</text></g>
                  <g transform="rotate(-45)"><text x="0" y="-20">A</text></g>
                  <g transform="rotate(135)"><text x="0" y="-20">A</text></g>
                </g>
            </svg>

            <h1>Artanat</h1>
            <nav id="main-nav">
                <a data-tab="feed" class="active">Лента</a>
                <a data-tab="arterrii">Артеррии</a>
                <a data-tab="travel">База</a>
                <a data-tab="friends">Друзья</a>
            </nav>
        </header>

        <div id="loading-overlay">>> Соединение с ядром Артаната...</div>

        <div id="view-feed" class="view-section active">
            <div id="feed-container"></div>
        </div>

        <div id="view-branches" class="view-section">
            <div class="branch-controls">
                <input type="text" id="new-branch-name" class="styled-input" placeholder=">> Имя новой ветки...">
                <input type="password" id="new-branch-pwd" class="styled-input" placeholder=">> Пароль (пусто = публично)">
                <button id="create-branch-btn" class="action-btn submit-btn">Создать</button>
            </div>
            <div id="branches-list-container"></div>
        </div>

        <div id="view-branch-content" class="view-section">
            <div class="header-action">
                <button id="back-to-branches" class="action-btn"><i class="fa-solid fa-arrow-left"></i> Назад к веткам</button>
                <h2 id="current-branch-title" style="color: var(--text-accent);"></h2>
            </div>

            <div class="composer">
                <input type="text" id="author-input" class="styled-input" style="padding: 10px 20px;" value="Dante_Sogliano" placeholder="Имя создателя">
                <textarea id="post-input" placeholder=">> Ввести новую мысль..." oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <div id="file-preview" style="padding: 0 20px 10px; color: var(--text-accent); font-size: 0.8rem; display: none;"></div>
                <input type="file" id="file-input" style="display: none;" accept="image/*,video/*,audio/*">

                <div class="composer-actions">
                    <button id="upload-btn" class="action-btn"><i class="fa-solid fa-paperclip"></i> Файл</button>
                    <button id="link-btn" class="action-btn"><i class="fa-solid fa-link"></i> Ссылка</button>
                    <button id="submit-btn" class="action-btn submit-btn">Отправить</button>
                </div>
            </div>

            <div id="branch-posts-container"></div>
        </div>

        <footer>
            <p>2026. Артанат – цифровой город искусства. Только для просмотра. Все права защищены. Все мысли и слова мои.</p>
        </footer>
    </div>

    <script>
        // ================= FIREBASE НАСТРОЙКИ (СКОПИРУЙ СЮДА СВОИ ДАННЫЕ ИЗ FIREBASE!) ================= //
        const firebaseConfig = {
            apiKey: "ВСТАВЬ_СЮДА_СВОЙ_КЛЮЧ",
            authDomain: "ВСТАВЬ_СЮДА_СВОЙ_ДОМЕН",
            projectId: "ВСТАВЬ_СЮДА_СВОЙ_ID",
            storageBucket: "ВСТАВЬ_СЮДА_СВОЙ_BUCKET",
            messagingSenderId: "ВСТАВЬ_СЮДА",
            appId: "ВСТАВЬ_СЮДА"
        };

        // Мастер-пароль администратора (для удаления веток/постов)
        const MASTER_PASSWORD = "dante"; 
        
        let db, storage;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            storage = firebase.storage();
        } catch(e) {
            console.error("Firebase не настроен! Заполни блок firebaseConfig.");
        }

        // ================= ДИНАМИЧЕСКИЙ ЦВЕТ И UI ================= //
        const brandColors = ['#FF0000', '#FF8000', '#FFFF00', '#00FF80', '#00D0FF', '#0000FF', '#8000FF'];
        const randomColor = brandColors[Math.floor(Math.random() * brandColors.length)];
        document.documentElement.style.setProperty('--text-accent', randomColor);
        document.documentElement.style.setProperty('--border-color', randomColor + '4D');

        const hideBtn = document.getElementById('hide-btn');
        const container = document.getElementById('main-container');
        let isHidden = false;
        hideBtn.addEventListener('click', () => {
            isHidden = !isHidden;
            container.classList.toggle('hidden-ui');
            hideBtn.querySelector('i').classList.toggle('fa-eye-slash');
            hideBtn.querySelector('i').classList.toggle('fa-eye');
        });

        const logo = document.getElementById('main-logo');
        let currentRotation = 0;
        logo.addEventListener('pointerdown', (e) => {
            e.preventDefault(); 
            currentRotation += 1080; 
            logo.style.transition = 'transform 2.5s cubic-bezier(0.15, 0.85, 0.3, 1)'; 
            logo.style.transform = `rotate(${currentRotation}deg)`;
        });

        // ================= ЛОГИКА АРТАНАТА (Ветки и Посты) ================= //
        let currentTab = 'feed';
        let currentBranchId = null;
        let isCurrentBranchPublic = true;
        let selectedFile = null;

        const views = {
            feed: document.getElementById('view-feed'),
            branches: document.getElementById('view-branches'),
            content: document.getElementById('view-branch-content')
        };

        function switchView(viewName) {
            Object.values(views).forEach(v => v.classList.remove('active'));
            views[viewName].classList.add('active');
        }

        const navLinks = document.querySelectorAll('#main-nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                currentTab = link.getAttribute('data-tab');
                currentBranchId = null;
                
                if (currentTab === 'feed') {
                    switchView('feed');
                    loadGlobalFeed();
                } else {
                    switchView('branches');
                    loadBranches();
                }
            });
        });

        document.getElementById('back-to-branches').addEventListener('click', () => {
            currentBranchId = null;
            switchView('branches');
            loadBranches();
        });

        // --- Работа с ВЕТКАМИ ---
        document.getElementById('create-branch-btn').addEventListener('click', async () => {
            if (!db) return alert('Firebase не подключен!');
            const nameInput = document.getElementById('new-branch-name');
            const pwdInput = document.getElementById('new-branch-pwd');
            const name = nameInput.value.trim();
            const password = pwdInput.value;

            if (!name) return;
            
            const adminCheck = prompt("Создание ветки. Введи пароль админа (Master Password):");
            if(adminCheck !== MASTER_PASSWORD) return alert("Отказано в доступе");

            await db.collection('branches').add({
                tab: currentTab,
                name: name,
                password: password,
                isPublic: password === "",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            nameInput.value = '';
            pwdInput.value = '';
            loadBranches();
        });

        function loadBranches() {
            if (!db) return;
            const container = document.getElementById('branches-list-container');
            container.innerHTML = 'Загрузка...';

            db.collection('branches')
              .where('tab', '==', currentTab)
              .orderBy('createdAt', 'desc')
              .get().then(snapshot => {
                  container.innerHTML = '';
                  if (snapshot.empty) return container.innerHTML = '<p style="color: var(--text-dim);">Здесь пока нет веток.</p>';
                  
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = 'branch-card';
                      div.innerHTML = `
                          <div>
                            <div class="branch-name">
                                ${!data.isPublic ? '<i class="fa-solid fa-lock" style="font-size:0.8em;"></i> ' : ''}
                                ${data.name}
                            </div>
                            <div class="branch-meta">Тема открыта</div>
                          </div>
                          <button class="delete-btn" onclick="deleteBranch('${doc.id}', event)" title="Удалить ветку"><i class="fa-solid fa-trash"></i></button>
                      `;
                      div.addEventListener('click', (e) => {
                          if(e.target.closest('.delete-btn')) return; // Игнор клика по удалению
                          openBranch(doc.id, data.name, data.password, data.isPublic);
                      });
                      container.appendChild(div);
                  });
              });
        }

        window.deleteBranch = async function(id, event) {
            event.stopPropagation();
            const adminCheck = prompt("Введи пароль админа для удаления ветки:");
            if(adminCheck !== MASTER_PASSWORD) return alert("Отказано в доступе");
            
            await db.collection('branches').doc(id).delete();
            loadBranches();
        }

        function openBranch(id, name, correctPassword, isPublic) {
            if (!isPublic) {
                const entered = prompt(`Ветка "${name}" защищена. Введите пароль:`);
                if (entered !== correctPassword) return alert('Неверный пароль!');
            }
            
            currentBranchId = id;
            isCurrentBranchPublic = isPublic;
            document.getElementById('current-branch-title').innerText = name;
            switchView('content');
            loadBranchPosts();
        }

        // --- Работа с ПОСТАМИ ---
        const fileInput = document.getElementById('file-input');
        const filePreview = document.getElementById('file-preview');

        document.getElementById('upload-btn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                filePreview.style.display = 'block';
                filePreview.innerHTML = `Прикреплено: ${selectedFile.name}`;
            }
        });

        document.getElementById('submit-btn').addEventListener('click', async () => {
            if (!db) return alert('Firebase не подключен!');
            const textInput = document.getElementById('post-input');
            const authorInput = document.getElementById('author-input');
            const text = textInput.value.trim();
            const author = authorInput.value.trim() || 'Dante_Sogliano';

            if (!text && !selectedFile) return;

            // Только админ (или тот, кто знает код) может писать посты
            const adminCheck = prompt("Для отправки введи пароль (Master Password):");
            if(adminCheck !== MASTER_PASSWORD) return alert("Отказано в доступе");

            document.getElementById('loading-overlay').style.display = 'block';

            let mediaUrl = null;
            let mediaType = null;

            // Загрузка файла в Storage
            if (selectedFile) {
                const storageRef = storage.ref(`media/${Date.now()}_${selectedFile.name}`);
                await storageRef.put(selectedFile);
                mediaUrl = await storageRef.getDownloadURL();
                if (selectedFile.type.startsWith('image/')) mediaType = 'image';
                else if (selectedFile.type.startsWith('video/')) mediaType = 'video';
                else if (selectedFile.type.startsWith('audio/')) mediaType = 'audio';
            }

            // Добавление ссылки через кнопку
            if(text.includes('<img') || text.includes('<video')) {
                 mediaType = 'link'; // Ссылка была вставлена текстом
            }

            await db.collection('posts').add({
                branchId: currentBranchId,
                isPublic: isCurrentBranchPublic, 
                author: author,
                text: text,
                mediaUrl: mediaUrl,
                mediaType: mediaType,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            textInput.value = '';
            textInput.style.height = '100px';
            fileInput.value = '';
            selectedFile = null;
            filePreview.style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'none';
            
            loadBranchPosts();
        });

        function formatPostContent(post) {
            let mediaHTML = '';
            if (post.mediaUrl) {
                if (post.mediaType === 'image') mediaHTML = `<img src="${post.mediaUrl}">`;
                else if (post.mediaType === 'video') mediaHTML = `<video controls src="${post.mediaUrl}"></video>`;
                else if (post.mediaType === 'audio') mediaHTML = `<audio controls src="${post.mediaUrl}"></audio>`;
            }
            
            const date = post.timestamp ? new Date(post.timestamp.toDate()).toLocaleString('ru-RU') : 'Только что';
            
            return `
                <div class="post-meta">
                    <span>user@artanat:~$ <span class="post-author">${post.author}</span></span>
                    <div>
                        <span>${date}</span>
                        ${currentBranchId ? `<button class="delete-btn" onclick="deletePost('${post.id}')" title="Удалить"><i class="fa-solid fa-xmark"></i></button>` : ''}
                    </div>
                </div>
                <div class="post-content">${post.text}${mediaHTML}</div>
            `;
        }

        window.deletePost = async function(id) {
            const adminCheck = prompt("Введи пароль админа для удаления:");
            if(adminCheck !== MASTER_PASSWORD) return alert("Отказано");
            await db.collection('posts').doc(id).delete();
            loadBranchPosts();
        }

        function loadBranchPosts() {
            const container = document.getElementById('branch-posts-container');
            container.innerHTML = '';
            db.collection('posts')
              .where('branchId', '==', currentBranchId)
              .orderBy('timestamp', 'desc')
              .onSnapshot(snapshot => {
                  container.innerHTML = '';
                  snapshot.forEach(doc => {
                      const div = document.createElement('article');
                      div.className = 'post';
                      div.innerHTML = formatPostContent({id: doc.id, ...doc.data()});
                      container.appendChild(div);
                  });
              });
        }

        // Общая Лента
        function loadGlobalFeed() {
            if (!db) return;
            const container = document.getElementById('feed-container');
            container.innerHTML = 'Загрузка эха Артеррии...';
            
            // Загружаем только те посты, которые лежат в открытых (isPublic) ветках
            db.collection('posts')
              .where('isPublic', '==', true)
              .orderBy('timestamp', 'desc')
              .onSnapshot(snapshot => {
                  container.innerHTML = '';
                  if (snapshot.empty) return container.innerHTML = '<p style="color: var(--text-dim);">> Лента пуста. Эхо еще не прозвучало.</p>';
                  
                  snapshot.forEach(doc => {
                      const div = document.createElement('article');
                      div.className = 'post';
                      div.innerHTML = formatPostContent({id: doc.id, ...doc.data()});
                      container.appendChild(div);
                  });
              });
        }

        // Если Firebase инициализирован, загружаем ленту при старте
        if (db) setTimeout(loadGlobalFeed, 500);

        // ================= ОРИГИНАЛЬНЫЙ ФОН И ВОДЯНЫЕ ЗНАКИ (СВЕРНУТО ДЛЯ ЭКОНОМИИ МЕСТА) ================= //
        // (Остальная часть кода со звездами WebGL и Three.js остается абсолютно такой же, как в прошлой версии)
        // Чтобы код не обрывался, я скопирую сюда WebGL инициализацию из предыдущего ответа:
        
        const canvas = document.getElementById('starfield');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: false });
        if (gl) {
            const vertexShader = `attribute vec3 aPosition; attribute float aSize; attribute float aAlpha; attribute float aColorIndex; uniform mat4 uProjection; uniform mat4 uModelView; uniform float uTime; varying float vAlpha; varying float vColorIndex; void main() { vec4 pos = uModelView * vec4(aPosition, 1.0); pos.xyz += sin(uTime * 0.001 + aColorIndex * 10.0) * 5.0; gl_Position = uProjection * pos; gl_PointSize = aSize * (1.5 + sin(uTime * 0.005 + aColorIndex) * 0.5); vAlpha = aAlpha; vColorIndex = aColorIndex; }`;
            const fragmentShader = `precision highp float; uniform float uTime; varying float vAlpha; varying float vColorIndex; vec3 getColor(float index) { int colorType = int(mod(index * 10.0, 7.0)); if (colorType == 0) return vec3(0.5, 0.0, 1.0); if (colorType == 1) return vec3(0.0, 0.0, 1.0); if (colorType == 2) return vec3(0.0, 0.75, 1.0); if (colorType == 3) return vec3(0.0, 1.0, 0.5); if (colorType == 4) return vec3(1.0, 1.0, 0.0); if (colorType == 5) return vec3(1.0, 0.38, 0.0); if (colorType == 6) return vec3(1.0, 0.0, 0.0); return vec3(0.9); } void main() { float dist = length(gl_PointCoord - vec2(0.5)); if (dist > 0.5) discard; float alpha = vAlpha * (0.6 + 0.4 * sin(uTime * 0.002 + vColorIndex * 10.0)); vec3 color = mix(vec3(0.9), getColor(vColorIndex), step(0.93, vColorIndex)); gl_FragColor = vec4(color, alpha * (1.0 - smoothstep(0.3, 0.5, dist))); }`;
            function compileShader(gl, source, type) { const shader = gl.createShader(type); gl.shaderSource(shader, source); gl.compileShader(shader); return shader; }
            const vs = compileShader(gl, vertexShader, gl.VERTEX_SHADER); const fs = compileShader(gl, fragmentShader, gl.FRAGMENT_SHADER); const program = gl.createProgram(); gl.attachShader(program, vs); gl.attachShader(program, fs); gl.linkProgram(program); gl.useProgram(program);
            const STARS_COUNT = 7000; const positions = new Float32Array(STARS_COUNT * 3); const sizes = new Float32Array(STARS_COUNT); const alphas = new Float32Array(STARS_COUNT); const colorIndices = new Float32Array(STARS_COUNT);
            for (let i = 0; i < STARS_COUNT; i++) { positions[i*3] = (Math.random() - 0.5) * 2500; positions[i*3+1] = (Math.random() - 0.5) * 2500; positions[i*3+2] = (Math.random() - 0.5) * 2500; sizes[i] = 0.8 + Math.random() * 1.4; alphas[i] = 0.7 + Math.random() * 0.3; colorIndices[i] = Math.random(); }
            const positionBuffer = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer); gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
            const sizeBuffer = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer); gl.bufferData(gl.ARRAY_BUFFER, sizes, gl.STATIC_DRAW);
            const alphaBuffer = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuffer); gl.bufferData(gl.ARRAY_BUFFER, alphas, gl.STATIC_DRAW);
            const colorIndexBuffer = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, colorIndexBuffer); gl.bufferData(gl.ARRAY_BUFFER, colorIndices, gl.STATIC_DRAW);
            const aPosition = gl.getAttribLocation(program, 'aPosition'); gl.enableVertexAttribArray(aPosition); gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);
            const aSize = gl.getAttribLocation(program, 'aSize'); gl.enableVertexAttribArray(aSize); gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);
            const aAlpha = gl.getAttribLocation(program, 'aAlpha'); gl.enableVertexAttribArray(aAlpha); gl.vertexAttribPointer(aAlpha, 1, gl.FLOAT, false, 0, 0);
            const aColorIndex = gl.getAttribLocation(program, 'aColorIndex'); gl.enableVertexAttribArray(aColorIndex); gl.vertexAttribPointer(aColorIndex, 1, gl.FLOAT, false, 0, 0);
            const uProjection = gl.getUniformLocation(program, 'uProjection'); const uModelView = gl.getUniformLocation(program, 'uModelView'); const uTime = gl.getUniformLocation(program, 'uTime');
            const projection = new Float32Array(16); const modelView = new Float32Array(16);
            function updateMatrix() { const fov = 75 * Math.PI / 180; const aspect = window.innerWidth / window.innerHeight; const near = 0.1; const far = 10000; const f = 1.0 / Math.tan(fov / 2); projection.fill(0); projection[0] = f / aspect; projection[5] = f; projection[10] = (far + near) / (near - far); projection[11] = -1; projection[14] = (2 * far * near) / (near - far); modelView.fill(0); modelView[0] = 1; modelView[5] = 1; modelView[10] = 1; modelView[15] = 1; modelView[14] = -1200; }
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            let time = 0; function renderStars() { time += 16; gl.viewport(0, 0, canvas.width, canvas.height); gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT); const speed = 0.009; modelView[0] = Math.cos(time * speed * 0.15); modelView[2] = Math.sin(time * speed * 0.09); modelView[8] = -Math.sin(time * speed * 0.1); modelView[10] = Math.cos(time * speed * 0.09); gl.uniformMatrix4fv(uProjection, false, projection); gl.uniformMatrix4fv(uModelView, false, modelView); gl.uniform1f(uTime, time); gl.drawArrays(gl.POINTS, 0, STARS_COUNT); requestAnimationFrame(renderStars); }
            function resize() { canvas.width = window.innerWidth * window.devicePixelRatio; canvas.height = window.innerHeight * window.devicePixelRatio; canvas.style.width = window.innerWidth + 'px'; canvas.style.height = window.innerHeight + 'px'; updateMatrix(); }
            window.addEventListener('resize', resize); resize(); updateMatrix(); renderStars();
        }

        const watermarkScene = new THREE.Scene(); const watermarkCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000); watermarkCamera.position.z = 20;
        const watermarkRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); watermarkRenderer.setSize(window.innerWidth, window.innerHeight); watermarkRenderer.domElement.style.position = 'fixed'; watermarkRenderer.domElement.style.top = '0'; watermarkRenderer.domElement.style.left = '0'; watermarkRenderer.domElement.style.zIndex = '-1'; watermarkRenderer.domElement.style.pointerEvents = 'none'; watermarkRenderer.domElement.style.opacity = '0.5'; document.getElementById('watermark').appendChild(watermarkRenderer.domElement);
        const watermarkConfig = { columns: 12, rows: 10, baseSize: 0.2, speed: 0.015, drift: 0.03, opacity: 0.4, colors: [ new THREE.Color(randomColor), new THREE.Color(1.0, 1.0, 1.0), new THREE.Color(0.5, 0.5, 0.5) ] };
        class SeamlessWatermark { constructor(font) { this.font = font; this.meshes = []; this.initSeamlessGrid(); } initSeamlessGrid() { const texts = ['Artanat', 'arterrii', 'Dante Sogliano', 'artanat.com']; const columnWidth = 80 / watermarkConfig.columns; const rowHeight = 60 / watermarkConfig.rows; for (let col = 0; col < watermarkConfig.columns; col++) { for (let row = 0; row < watermarkConfig.rows * 1.5; row++) { const text = texts[Math.floor(Math.random() * texts.length)]; this.createWatermark(text, -40 + col * columnWidth + (Math.random() - 0.5) * columnWidth * 0.8, 30 - row * rowHeight * 0.6 + (Math.random() - 0.5) * rowHeight * 0.4); } } } createWatermark(text, x, y) { const size = watermarkConfig.baseSize * (0.8 + Math.random() * 0.5); const color = watermarkConfig.colors[Math.floor(Math.random() * watermarkConfig.colors.length)].clone(); const geometry = new THREE.TextGeometry(text, { font: this.font, size: size, height: 0.01, curveSegments: 2 }); const material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: watermarkConfig.opacity * (0.5 + Math.random() * 0.5), blending: THREE.NormalBlending }); const mesh = new THREE.Mesh(geometry, material); mesh.position.set(x, y, (Math.random() - 0.5) * 15); mesh.userData = { speed: watermarkConfig.speed * (0.8 + Math.random() * 0.6), drift: watermarkConfig.drift * (0.5 + Math.random()), phase: Math.random() * Math.PI * 2, initialY: y }; watermarkScene.add(mesh); this.meshes.push(mesh); } update(time) { this.meshes.forEach(mesh => { const ud = mesh.userData; mesh.position.y -= ud.speed; mesh.position.x += Math.cos(time * 0.001 + ud.phase) * ud.drift * 0.2; if (mesh.position.y < -30) { mesh.position.y = 30; mesh.position.x = ud.initialY + (Math.random() - 0.5) * 5; } mesh.material.opacity = watermarkConfig.opacity * (0.6 + Math.sin(time * 0.002 + ud.phase) * 0.4); }); } }
        new THREE.FontLoader().load('https://cdn.jsdelivr.net/npm/three@0.132.2/examples/fonts/helvetiker_regular.typeface.json', (font) => { const watermarkSystem = new SeamlessWatermark(font); function animateWatermarks(currentTime) { requestAnimationFrame(animateWatermarks); watermarkSystem.update(currentTime); watermarkRenderer.render(watermarkScene, watermarkCamera); } animateWatermarks(0); });
        window.addEventListener('resize', () => { watermarkCamera.aspect = window.innerWidth / window.innerHeight; watermarkCamera.updateProjectionMatrix(); watermarkRenderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
