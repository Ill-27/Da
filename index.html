        header.compact {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px dashed var(--border-color);
            padding: 15px 10px 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;

            document.getElementById('ui_footer').innerText = t.footer;
            document.getElementById('ui_back').innerText = t.back;
        }

        document.getElementById('lang-select').addEventListener('change', (e) => {
            currentLang = e.target.value;
            updateUITranslations();
            if (currentTab === 'feed') renderFeed();
            else if (document.getElementById('view-branches').classList.contains('active')) renderBranches();
            else renderBranchContent(); 
        });

        function getTranslatedText(obj) {
            if (!obj) return "";
            if (typeof obj === 'string') return obj; 
            if (obj[currentLang]) return obj[currentLang]; 
            if (obj['en']) return obj['en']; 
            return Object.values(obj)[0] || ""; 
        }

        const brandColors = ['#FF0000', '#FF8000', '#FFFF00', '#00FF80', '#00D0FF', '#0000FF', '#8000FF'];
        const randomColor = brandColors[Math.floor(Math.random() * brandColors.length)];
        document.documentElement.style.setProperty('--text-accent', randomColor);
        document.documentElement.style.setProperty('--border-color', randomColor + '4D');

        const hideBtn = document.getElementById('hide-btn');
        const container = document.getElementById('main-container');
        let isHidden = false;
        hideBtn.addEventListener('click', () => {
            isHidden = !isHidden;
            container.classList.toggle('hidden-ui');
            hideBtn.querySelector('i').classList.toggle('fa-eye-slash');
            hideBtn.querySelector('i').classList.toggle('fa-eye');
        });

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); fullscreenBtn.querySelector('i').classList.replace('fa-expand', 'fa-compress'); } 
            else { document.exitFullscreen(); fullscreenBtn.querySelector('i').classList.replace('fa-compress', 'fa-expand'); }
        });

        /* ЛОГИКА СКРОЛЛА: Сжатие шапки и кнопка Наверх */
        const scrollTopBtn = document.getElementById('scroll-top-btn');
        const mainHeader = document.getElementById('main-header');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) {
                mainHeader.classList.add('compact');
            } else {
                mainHeader.classList.remove('compact');
            }

            if (window.scrollY > 300) { scrollTopBtn.classList.add('visible'); } 
            else { scrollTopBtn.classList.remove('visible'); }
        });
        
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        const musicBtn = document.getElementById('music-btn');
        const audio = document.getElementById('bg-music');
        let isPlaying = false;

        if (typeof ARTANAT_DB !== 'undefined' && ARTANAT_DB.music && ARTANAT_DB.music.length > 0) {
            const randomTrack = ARTANAT_DB.music[Math.floor(Math.random() * ARTANAT_DB.music.length)];
            audio.src = randomTrack;
        }

        musicBtn.addEventListener('click', () => {
            if (isPlaying) { audio.pause(); musicBtn.querySelector('i').classList.replace('fa-pause', 'fa-play'); } 
            else { audio.play(); musicBtn.querySelector('i').classList.replace('fa-play', 'fa-pause'); }
            isPlaying = !isPlaying;
        });

        const logo = document.getElementById('main-logo');
        let currentRotation = 0;
        logo.addEventListener('pointerdown', (e) => {
            e.preventDefault(); currentRotation += 1080; 
            logo.style.transition = 'transform 2.5s cubic-bezier(0.15, 0.85, 0.3, 1)'; 
            logo.style.transform = `rotate(${currentRotation}deg)`;
        });

        const views = { feed: document.getElementById('view-feed'), branches: document.getElementById('view-branches'), content: document.getElementById('view-branch-content') };
        let currentTab = 'feed';
        let activeBranch = null;

        function switchView(viewName) {
            Object.values(views).forEach(v => v.classList.remove('active'));
            views[viewName].classList.add('active');
            document.getElementById('intro-text').style.display = (viewName === 'feed') ? 'block' : 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Плавный скролл наверх при смене вкладок
        }

        const navLinks = document.querySelectorAll('#main-nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                currentTab = link.getAttribute('data-tab');
                
                if (currentTab === 'feed') { switchView('feed'); renderFeed(); } 
                else { switchView('branches'); renderBranches(); }
            });
        });

        document.getElementById('back-to-branches').addEventListener('click', () => {
            switchView('branches');
            renderBranches();
        });

        function formatPost(post) {
            let mediaHTML = '';
            if (post.mediaUrl) {
                if (post.mediaType === 'image') mediaHTML = `<img src="${post.mediaUrl}">`;
                else if (post.mediaType === 'video') mediaHTML = `<video controls src="${post.mediaUrl}"></video>`;
                else if (post.mediaType === 'audio') mediaHTML = `<audio controls src="${post.mediaUrl}"></audio>`;
            }
            const postText = getTranslatedText(post.text);
            return `
                <div class="post-meta">
                    <span>creator@artanat:~# <span class="post-author">${post.author}</span></span>
                    <span>${post.date}</span>
                </div>
                <div class="post-content">${postText}${mediaHTML}</div>
            `;
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            if (typeof ARTANAT_DB === 'undefined') {
                container.innerHTML = `<p class="empty-msg" style="color: red;">>> Error: data.js not found!</p>`;
                return;
            }

            const publicBranchIds = ARTANAT_DB.branches.filter(b => b.password === "").map(b => b.id);
            const feedPosts = ARTANAT_DB.posts.filter(p => {
                if (!p.branchId || p.branchId === "feed" || p.branchId === "general") return true;
                return publicBranchIds.includes(p.branchId);
            });

            if (feedPosts.length === 0) {
                container.innerHTML = `<p class="empty-msg">${i18n[currentLang].empty_feed}</p>`;
                return;
            }

            feedPosts.forEach(post => {
                const div = document.createElement('article');
                div.className = 'post';
                div.innerHTML = formatPost(post);
                container.appendChild(div);
            });
        }

        function renderBranches() {
            const container = document.getElementById('branches-list-container');
            container.innerHTML = '';
            
            if (typeof ARTANAT_DB === 'undefined') return;
            const currentBranches = ARTANAT_DB.branches.filter(b => b.tab === currentTab);
            
            if (currentBranches.length === 0) {
                container.innerHTML = `<p class="empty-msg">${i18n[currentLang].empty_branch}</p>`;
                return;
            }

            currentBranches.forEach(branch => {
                const div = document.createElement('div');
                div.className = 'branch-card';
                const branchName = getTranslatedText(branch.name);
                div.innerHTML = `
                    <div>
                        <div class="branch-name">
                            ${branch.password !== "" ? '<i class="fa-solid fa-lock" style="font-size:0.8em; margin-right:5px;"></i>' : ''}
                            ${branchName}
                        </div>
                        <div class="branch-meta">${i18n[currentLang].open}</div>
                    </div>
                `;
                div.addEventListener('click', () => openBranch(branch));
                container.appendChild(div);
            });
        }

        function openBranch(branch) {
            if (branch.password !== "") {
                const pass = prompt(i18n[currentLang].pass_prompt);
                if (pass !== branch.password) return alert(i18n[currentLang].pass_wrong);
            }
            activeBranch = branch;
            renderBranchContent();
            switchView('content');
        }

        function renderBranchContent() {
            if(!activeBranch) return;
            document.getElementById('current-branch-title').innerText = getTranslatedText(activeBranch.name);
            const container = document.getElementById('branch-posts-container');
            container.innerHTML = '';

            const branchPosts = ARTANAT_DB.posts.filter(p => p.branchId === activeBranch.id);
            
            if (branchPosts.length === 0) {
                container.innerHTML = `<p class="empty-msg">${i18n[currentLang].empty_posts}</p>`;
            } else {
                branchPosts.forEach(post => {
                    const div = document.createElement('article');
                    div.className = 'post';
                    div.innerHTML = formatPost(post);
                    container.appendChild(div);
                });
            }
        }

        // МГНОВЕННЫЙ ЗАПУСК БЕЗ ЗАДЕРЖЕК
        updateUITranslations();
        renderFeed();
    </script>

    <script>
        const canvas = document.getElementById('starfield');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: false });

        if (gl) {
            const vertexShaderSrc = `
                attribute vec3 aPosition;
                attribute float aSize;
                attribute float aAlpha;
                attribute float aColorIndex;
                uniform mat4 uProjection;
                uniform mat4 uModelView;
                uniform float uTime;
                varying float vAlpha;
                varying float vColorIndex;
                void main() {
                    vec4 pos = uModelView * vec4(aPosition, 1.0);
                    pos.xyz += sin(uTime * 0.001 + aColorIndex * 10.0) * 5.0;
                    gl_Position = uProjection * pos;
                    gl_PointSize = aSize * (1.5 + sin(uTime * 0.005 + aColorIndex) * 0.5);
                    vAlpha = aAlpha;
                    vColorIndex = aColorIndex;
                }
            `;

            const fragmentShaderSrc = `
                precision highp float;
                uniform float uTime;
                varying float vAlpha;
                varying float vColorIndex;
                vec3 getColor(float index) {
                    int colorType = int(mod(index * 10.0, 7.0));
                    if (colorType == 0) return vec3(0.5, 0.0, 1.0);   
                    if (colorType == 1) return vec3(0.0, 0.0, 1.0);   
                    if (colorType == 2) return vec3(0.0, 0.75, 1.0);  
                    if (colorType == 3) return vec3(0.0, 1.0, 0.5);   
                    if (colorType == 4) return vec3(1.0, 1.0, 0.0);   
                    if (colorType == 5) return vec3(1.0, 0.38, 0.0);  
                    if (colorType == 6) return vec3(1.0, 0.0, 0.0);   
                    return vec3(0.9); 
                }
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    float alpha = vAlpha * (0.6 + 0.4 * sin(uTime * 0.002 + vColorIndex * 10.0));
                    vec3 color = mix(vec3(0.9), getColor(vColorIndex), step(0.93, vColorIndex));
                    gl_FragColor = vec4(color, alpha * (1.0 - smoothstep(0.3, 0.5, dist)));
                }
            `;

            function compileShader(gl, source, type) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                return shader;
            }

            const vs = compileShader(gl, vertexShaderSrc, gl.VERTEX_SHADER);
            const fs = compileShader(gl, fragmentShaderSrc, gl.FRAGMENT_SHADER);
            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            gl.useProgram(program);

            const STARS_COUNT = 7000;
            const positions = new Float32Array(STARS_COUNT * 3);
            const sizes = new Float32Array(STARS_COUNT);
            const alphas = new Float32Array(STARS_COUNT);
            const colorIndices = new Float32Array(STARS_COUNT);

            for (let i = 0; i < STARS_COUNT; i++) {
                positions[i*3] = (Math.random() - 0.5) * 2500;
                positions[i*3+1] = (Math.random() - 0.5) * 2500;
                positions[i*3+2] = (Math.random() - 0.5) * 2500;
                sizes[i] = 0.8 + Math.random() * 1.4;
                alphas[i] = 0.7 + Math.random() * 0.3;
                colorIndices[i] = Math.random();
            }

            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

            const sizeBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, sizes, gl.STATIC_DRAW);

            const alphaBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, alphas, gl.STATIC_DRAW);

            const colorIndexBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, colorIndexBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, colorIndices, gl.STATIC_DRAW);

            const aPosition = gl.getAttribLocation(program, 'aPosition');
            gl.enableVertexAttribArray(aPosition);
            gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

            const aSize = gl.getAttribLocation(program, 'aSize');
            gl.enableVertexAttribArray(aSize);
            gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);

            const aAlpha = gl.getAttribLocation(program, 'aAlpha');
            gl.enableVertexAttribArray(aAlpha);
            gl.vertexAttribPointer(aAlpha, 1, gl.FLOAT, false, 0, 0);

            const aColorIndex = gl.getAttribLocation(program, 'aColorIndex');
            gl.enableVertexAttribArray(aColorIndex);
            gl.vertexAttribPointer(aColorIndex, 1, gl.FLOAT, false, 0, 0);

            const uProjection = gl.getUniformLocation(program, 'uProjection');
            const uModelView = gl.getUniformLocation(program, 'uModelView');
            const uTime = gl.getUniformLocation(program, 'uTime');

            const projection = new Float32Array(16);
            const modelView = new Float32Array(16);

            function updateMatrix() {
                const fov = 75 * Math.PI / 180;
                const aspect = window.innerWidth / window.innerHeight;
                const near = 0.1;
                const far = 10000;
                const f = 1.0 / Math.tan(fov / 2);
                
                projection.fill(0);
                projection[0] = f / aspect;
                projection[5] = f;
                projection[10] = (far + near) / (near - far);
                projection[11] = -1;
                projection[14] = (2 * far * near) / (near - far);
                
                modelView.fill(0);
                modelView[0] = 1;
                modelView[5] = 1;
                modelView[10] = 1;
                modelView[15] = 1;
                modelView[14] = -1200;
            }

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

            let time = 0;
            function renderStars() {
                time += 16;
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.clearColor(0, 0, 0, 1);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                
                const speed = 0.009;
                modelView[0] = Math.cos(time * speed * 0.15);
                modelView[2] = Math.sin(time * speed * 0.09);
                modelView[8] = -Math.sin(time * speed * 0.1);
                modelView[10] = Math.cos(time * speed * 0.09);
                
                gl.uniformMatrix4fv(uProjection, false, projection);
                gl.uniformMatrix4fv(uModelView, false, modelView);
                gl.uniform1f(uTime, time);
                
                gl.drawArrays(gl.POINTS, 0, STARS_COUNT);
                requestAnimationFrame(renderStars);
            }

            function resize() {
                canvas.width = window.innerWidth * window.devicePixelRatio;
                canvas.height = window.innerHeight * window.devicePixelRatio;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
                updateMatrix();
            }

            window.addEventListener('resize', resize);
            resize();
            updateMatrix();
            renderStars();
        }

        const watermarkScene = new THREE.Scene();
        const watermarkCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        watermarkCamera.position.z = 20;

        const watermarkRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        watermarkRenderer.setSize(window.innerWidth, window.innerHeight);
        watermarkRenderer.domElement.style.position = 'fixed';
        watermarkRenderer.domElement.style.top = '0';
        watermarkRenderer.domElement.style.left = '0';
        watermarkRenderer.domElement.style.zIndex = '-1';
        watermarkRenderer.domElement.style.pointerEvents = 'none';
        watermarkRenderer.domElement.style.opacity = '0.5'; 
        document.getElementById('watermark').appendChild(watermarkRenderer.domElement);

        const watermarkConfig = {
            columns: 12, rows: 10, baseSize: 0.2, speed: 0.015, drift: 0.03, opacity: 0.4,
            colors: [
                new THREE.Color(randomColor),
                new THREE.Color(1.0, 1.0, 1.0),
                new THREE.Color(0.5, 0.5, 0.5)
            ]
        };

        class SeamlessWatermark {
            constructor(font) {
                this.font = font;
                this.meshes = [];
                this.initSeamlessGrid();
            }
            initSeamlessGrid() {
                const texts = ['Artanat', 'arterrii', 'Dante Sogliano', 'artanat.com'];
                const columnWidth = 80 / watermarkConfig.columns;
                const rowHeight = 60 / watermarkConfig.rows;
                for (let col = 0; col < watermarkConfig.columns; col++) {
                    for (let row = 0; row < watermarkConfig.rows * 1.5; row++) {
                        const text = texts[Math.floor(Math.random() * texts.length)];
                        this.createWatermark(text, -40 + col * columnWidth + (Math.random() - 0.5) * columnWidth * 0.8, 30 - row * rowHeight * 0.6 + (Math.random() - 0.5) * rowHeight * 0.4);
                    }
                }
            }
            createWatermark(text, x, y) {
                const size = watermarkConfig.baseSize * (0.8 + Math.random() * 0.5);
                const color = watermarkConfig.colors[Math.floor(Math.random() * watermarkConfig.colors.length)].clone();
                const geometry = new THREE.TextGeometry(text, { font: this.font, size: size, height: 0.01, curveSegments: 2 });
                const material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: watermarkConfig.opacity * (0.5 + Math.random() * 0.5), blending: THREE.NormalBlending });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x, y, (Math.random() - 0.5) * 15);
                mesh.userData = { speed: watermarkConfig.speed * (0.8 + Math.random() * 0.6), drift: watermarkConfig.drift * (0.5 + Math.random()), phase: Math.random() * Math.PI * 2, initialY: y };
                watermarkScene.add(mesh);
                this.meshes.push(mesh);
            }
            update(time) {
                this.meshes.forEach(mesh => {
                    const ud = mesh.userData;
                    mesh.position.y -= ud.speed;
                    mesh.position.x += Math.cos(time * 0.001 + ud.phase) * ud.drift * 0.2;
                    if (mesh.position.y < -30) {
                        mesh.position.y = 30;
                        mesh.position.x = ud.initialY + (Math.random() - 0.5) * 5;
                    }
                    mesh.material.opacity = watermarkConfig.opacity * (0.6 + Math.sin(time * 0.002 + ud.phase) * 0.4);
                });
            }
        }

        new THREE.FontLoader().load('https://cdn.jsdelivr.net/npm/three@0.132.2/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            const watermarkSystem = new SeamlessWatermark(font);
            function animateWatermarks(currentTime) {
                requestAnimationFrame(animateWatermarks);
                watermarkSystem.update(currentTime);
                watermarkRenderer.render(watermarkScene, watermarkCamera);
            }
            animateWatermarks(0);
        });

        window.addEventListener('resize', () => {
            watermarkCamera.aspect = window.innerWidth / window.innerHeight;
            watermarkCamera.updateProjectionMatrix();
            watermarkRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
